{% extends "base.html" %}

{% block content %}

<h1>Portal de Contratações</h1>

<form action="/contratos" method="GET">

    <label>Selecione o setor</label>

    <br><br>

    <select name="setor">

        {% for setor in setores %}
            <option value="{{ setor }}">
                {{ setor }}
            </option>
        {% endfor %}

    </select>

    <br><br>

    <button type="submit">
        Entrar
    </button>

</form>

{% endblock %}
