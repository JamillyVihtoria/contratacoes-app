{% extends "base.html" %}

{% block content %}

<h1>Portal de Contratações</h1>

<form>

    <label>Selecione o setor</label>

    <select>
        {% for setor in setores %}
        <option>{{ setor }}</option>
        {% endfor %}
    </select>

    <button type="submit">
        Entrar
    </button>

</form>

{% endblock %}
