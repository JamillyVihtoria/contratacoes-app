{% extends "base.html" %}

{% block content %}

<h1>{{ contrato.nome }}</h1>

<p>
    Processo: {{ contrato.processo }}
</p>

<div class="pipeline">

    {% for fase in fases %}

        <div class="fase-container">

            <div
                id="fase-{{ loop.index0 }}"
                class="bolinha {{ fase.status }}"
                {% if fase.status == 'atual' %}
                    onclick="abrirModal()"
                {% endif %}
            >
                {{ loop.index }}
            </div>

            <div class="fase-label">
                {{ fase.nome }}
            </div>

        </div>

        {% if not loop.last %}
            <div class="linha"></div>
        {% endif %}

    {% endfor %}

</div>

<script>

const fases = {{ fases|tojson }};

</script>

<div id="modalFluxo" class="modal">

    <div class="modal-content">

        <h3>
            A contratação avançou ou retornou?
        </h3>

        <button onclick="mostrarAvanco()">
            Avançou
        </button>

        <button onclick="mostrarRetorno()">
            Retornou
        </button>

        <button onclick="fecharModal()">
            Cancelar
        </button>

    </div>

</div>

<div id="opcoesFase"></div>

{% endblock %}
